kind = "mobile"
previewPath = "/"
title = "Mena Wallet"
version = "1.0.0"
id = "artifacts/mena-wallet"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 18736
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mena-wallet run dev"

[services.env]
PORT = "18736"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mena-wallet", "run", "build"]
run = ["pnpm", "--filter", "@workspace/mena-wallet", "run", "serve"]
